# @phlix/contracts — CI
#
# Deterministic gate: lint, typecheck, build (typecheck + bundle + d.ts), and
# run the full vitest suite. Manual dispatch by default (no runner wired to
# this repo yet); uncomment the triggers to make it a required PR check.
name: contracts-ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:run
